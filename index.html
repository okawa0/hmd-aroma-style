<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AromaStyle</title>
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="header__inner">
        <h1 class="header__logo">
          <img
            src="./assets/images/logo.webp"
            alt="AromaStyle HMD HOLDINGSのロゴ"
            width="180"
            height="40"
          />
        </h1>

        <div class="header__actions">
          <nav class="header__nav">
            <ul class="header__list">
              <li class="header__item">
                <a href="#" class="header__link">香りマーケティング</a>
              </li>
              <li class="header__item">
                <a href="#" class="header__link">メリット</a>
              </li>
              <li class="header__item">
                <a href="#" class="header__link">ディフューザー</a>
              </li>
            </ul>
          </nav>
          <a href="#" class="header__button">お問い合わせ</a>
        </div>
        
        <button class="header__menu" type="button">
          <img
            src="./assets/images/menu.webp"
            alt="メニューを開く"
            width="32"
            height="32"
            loading="lazy"
          />
        </button>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="hero__image">
          <picture>
            <source
              srcset="./assets/images/hero-pc.webp"
              media="(min-width: 768px)"
              type="image/webp"
            />
            <img
              src="./assets/images/hero-sp.webp"
              alt="ディフューザーと植物のある室内イメージ"
              width="1200"
              height="700"
            />
          </picture>
        </div>

        <div class="hero__content">
          <p class="hero__catch">
            香りマーケティング<br />
            嗅覚を通して感情に訴えるマーケティング
          </p>

          <div class="hero__title">
            <picture>
              <source
                srcset="./assets/images/hero-title-pc.webp"
                media="(min-width: 768px)"
                type="image/webp"
              />
              <img
                src="./assets/images/hero-title-sp.webp"
                alt="Bel Air Collection AromaStyle"
                width="600"
                height="200"
              />
            </picture>
          </div>
        </div>
      </section>

      <section class="branding">
        <div class="branding__inner">
          <h2 class="branding__title">SCENT BRANDING</h2>

          <p class="branding__lead">
            昨今の過酷なビジネス競争環境では、顧客の記憶に残る体験や感情のつながりを生むことが重要です。
          </p>

          <p class="branding__text">
            香りによるブランディングとは、単に空間を満たすだけではなく、
            ブランドの価値やメッセージを伝える手法です。
          </p>

          <p class="branding__text">
            香りを取り入れることで、顧客体験が向上し、
            滞在時間や購買意欲の向上につながります。
          </p>

          <p class="branding__text">
            記憶に残る香りは再訪を促し、 リピーター創出にも寄与します。
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
